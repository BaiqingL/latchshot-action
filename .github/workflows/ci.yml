name: Validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: bash -n scripts/capture.sh
      - run: node --check examples/node.mjs
      - run: python -m py_compile examples/python.py
